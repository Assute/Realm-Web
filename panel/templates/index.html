<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Realm Panel</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{--primary:#3b82f6;--danger:#f87171;--success:#34d399;--text-main:#374151}
    ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:10px}
    *{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;padding:0;height:100vh;height:100dvh;overflow:hidden;background:url('__BG_PC__') no-repeat center center/cover;display:flex;flex-direction:column;color:var(--text-main)}
    @media(max-width:768px){body{background-image:url('__BG_MOBILE__')}}
    .navbar{flex:0 0 auto;background:rgba(255,255,255,0.3);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);border-bottom:1px solid rgba(255,255,255,0.3);padding:0.8rem 2rem;display:flex;justify-content:space-between;align-items:center;z-index:10}
    .brand{font-weight:700;font-size:1.1rem;color:var(--text-main);display:flex;align-items:center;gap:10px}
    .container{flex:1;display:flex;flex-direction:column;max-width:1100px;margin:1.5rem auto;width:95%;overflow:hidden}
    .card-fixed{background:rgba(255,255,255,0.3);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.4);border-radius:18px;padding:1.2rem;margin-bottom:1.5rem;box-shadow:0 4px 15px rgba(0,0,0,0.03)}
    .card-scroll{flex:1;background:rgba(255,255,255,0.25);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.4);border-radius:18px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.03)}
    .table-wrapper{flex:1;overflow-y:auto;padding:0 1.5rem 1.5rem}
    table{width:100%;border-collapse:separate;border-spacing:0 10px}
    thead th{position:sticky;top:0;background:rgba(255,255,255,0.4);backdrop-filter:blur(15px);z-index:5;padding:14px 12px;text-align:left;font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;color:#6b7280;border-top:1px solid rgba(255,255,255,0.3);border-bottom:1px solid rgba(255,255,255,0.3)}
    thead th:first-child{border-top-left-radius:15px;border-bottom-left-radius:15px;border-left:1px solid rgba(255,255,255,0.3)}
    thead th:last-child{border-top-right-radius:15px;border-bottom-right-radius:15px;border-right:1px solid rgba(255,255,255,0.3)}
    tbody tr{background:transparent;transition:.3s}
    @media(min-width:768px){tbody tr:hover td{background:rgba(255,255,255,0.7);transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,0.02)}}
    td{background:rgba(255,255,255,0.4);padding:14px 12px;font-size:0.92rem;font-weight:500;color:var(--text-main);border-top:1px solid rgba(255,255,255,0.3);border-bottom:1px solid rgba(255,255,255,0.3)}
    td:first-child{border-left:1px solid rgba(255,255,255,0.3);border-top-left-radius:15px;border-bottom-left-radius:15px}
    td:last-child{border-right:1px solid rgba(255,255,255,0.3);border-top-right-radius:15px;border-bottom-right-radius:15px}
    .btn{padding:8px 12px;border-radius:10px;border:none;cursor:pointer;color:#fff;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-weight:500}
    .btn-primary{background:var(--primary);opacity:.9}.btn-danger{background:var(--danger);opacity:.9}.btn-gray{background:rgba(0,0,0,0.05);color:var(--text-main)}
    .grid-input{display:grid;grid-template-columns:1.5fr 1fr 2fr auto auto;gap:12px}
    .tools-group{display:flex;gap:5px}
    input,select,textarea{padding:10px 14px;border:1px solid rgba(0,0,0,0.05);background:rgba(255,255,255,0.5);border-radius:10px;outline:none;transition:.3s;color:var(--text-main);font-weight:500}
    input:focus,select:focus,textarea:focus{border-color:var(--primary);background:#fff}
    .status-dot{height:7px;width:7px;border-radius:50%;display:inline-block;margin-right:8px}
    .bg-green{background:var(--success);box-shadow:0 0 8px var(--success)}.bg-gray{background:#9ca3af}.bg-red{background:var(--danger)}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.1);z-index:100;justify-content:center;align-items:center;backdrop-filter:blur(8px)}
    .modal-box{background:rgba(255,255,255,0.9);width:90%;max-width:420px;padding:2rem;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.1);animation:pop .3s ease}
    @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
    .tab-header{display:flex;gap:20px;margin-bottom:20px;border-bottom:1px solid rgba(0,0,0,0.05)}
    .tab-btn{padding:10px 5px;cursor:pointer;font-size:.9rem;color:#9ca3af}.tab-btn.active{color:var(--primary);border-bottom:2px solid var(--primary);font-weight:600}
    .tab-content{display:none}.tab-content.active{display:block}
    label{display:block;margin:12px 0 6px;font-size:.85rem;color:#6b7280}
    .info-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:.9rem}.info-val{font-weight:600}
    .progress-bar{width:100%;height:10px;background:rgba(0,0,0,0.1);border-radius:5px;overflow:hidden;margin-top:5px}.progress-fill{height:100%;background:var(--primary);width:0%}
    @media(max-width:768px){.grid-input{grid-template-columns:1fr;gap:10px}.navbar{padding:.8rem 1rem}.nav-text{display:none}thead{display:none}tbody tr{display:flex;flex-direction:column;border-radius:18px!important;margin-bottom:12px;padding:15px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.4)}td{padding:6px 0;display:flex;justify-content:space-between;border-radius:0!important;align-items:center;border:none;background:transparent}td::before{content:attr(data-label);color:#9ca3af;font-size:.85rem}td[data-label="操作"]{justify-content:flex-end;gap:10px;margin-top:8px;padding-top:10px;border-top:1px solid rgba(0,0,0,0.05)}td[data-label="操作"] .btn{flex:none;width:auto;padding:6px 14px;border-radius:8px;font-size:.85rem}.tools-group{width:100%;margin-top:5px}.tools-group .btn{flex:1;justify-content:center;padding:10px 0;font-size:.85rem}}
  </style>
</head>
<body>
  <div class="navbar">
    <div class="brand"><i class="fas fa-layer-group"></i> <span class="nav-text">Realm 转发面板</span></div>
    <div class="nav-actions" style="display:flex;gap:15px">
      <button class="btn btn-gray" onclick="openSettings()"><i class="fas fa-sliders-h"></i> <span class="nav-text">面板设置</span></button>
      <button class="btn btn-danger" onclick="doLogout()"><i class="fas fa-power-off"></i></button>
    </div>
  </div>

  <div class="container">
    <div class="card-fixed">
      <div class="grid-input">
        <input id="n" placeholder="备注名称">
        <input id="l" placeholder="监听端口 (如 10000)">
        <input id="r" placeholder="目标 (例 1.2.3.4:443)">
        <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> 添加</button>
        <div class="tools-group">
          <button class="btn btn-primary" onclick="openBatch()" style="background:#8b5cf6"><i class="fas fa-paste"></i> 批量</button>
          <button class="btn btn-danger" onclick="delAll()" style="background:#ef4444"><i class="fas fa-trash"></i> 全删</button>
          <button class="btn btn-primary" onclick="downloadBackup()" style="background:#059669"><i class="fas fa-download"></i> 导出</button>
          <button class="btn btn-danger" onclick="openRestore()" style="background:#d97706"><i class="fas fa-upload"></i> 导入</button>
        </div>
      </div>
    </div>

    <div class="card-scroll">
      <div style="padding:1.2rem 1.5rem;font-weight:700;font-size:1rem;opacity:.8">转发规则管理</div>
      <div class="table-wrapper">
        <table id="ruleTable">
          <thead>
            <tr>
              <th>状态</th>
              <th>备注</th>
              <th>监听</th>
              <th>目标</th>
              <th>流量 (In/Out)</th>
              <th style="width:180px;text-align:right;padding-right:20px">操作</th>
            </tr>
          </thead>
          <tbody id="list"></tbody>
        </table>
        <div id="emptyView" style="display:none;text-align:center;padding:50px;color:#9ca3af"><i class="fas fa-inbox" style="font-size:2rem;display:block;margin-bottom:10px"></i>暂无规则</div>
      </div>
    </div>
  </div>

  <div id="ruleModal" class="modal">
    <div class="modal-box">
      <h3 id="modalTitle">添加规则</h3>
      <label>备注</label><input id="mod_n">
      <label>监听端口</label><input id="mod_l">
      <label>目标地址</label><input id="mod_r">
      <label>到期时间 (留空不限制)</label><input type="datetime-local" id="mod_e">
      <label>流量限制 (留空或0不限制)</label>
      <div style="display:flex;gap:10px">
        <input id="mod_t_val" type="number" placeholder="数值" style="flex:1">
        <select id="mod_t_unit">
          <option value="MB">MB</option>
          <option value="GB">GB</option>
        </select>
      </div>
      <div style="margin-top:25px;display:flex;justify-content:flex-end;gap:12px">
        <button class="btn btn-gray" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveRule()">保存</button>
      </div>
    </div>
  </div>

  <div id="viewModal" class="modal">
    <div class="modal-box">
      <h3 style="margin-bottom:20px;border-bottom:1px solid #eee;padding-bottom:10px">规则详情</h3>
      <div class="info-row"><span>备注</span><span class="info-val" id="view_n"></span></div>
      <div class="info-row"><span>监听</span><span class="info-val" id="view_l"></span></div>
      <div class="info-row"><span>目标</span><span class="info-val" id="view_r"></span></div>
      <div style="margin:15px 0;border-top:1px dashed #ddd;padding-top:10px"></div>
      <div id="view_expire_sec">
        <div class="info-row"><span>到期时间</span><span class="info-val" id="view_e_date"></span></div>
        <div style="text-align:right;font-size:.8rem;color:#666" id="view_e_remain"></div>
      </div>
      <div style="margin:15px 0;border-top:1px dashed #ddd;padding-top:10px"></div>
      <div id="view_traffic_sec">
        <div class="info-row"><span>流量使用 (Max)</span><span class="info-val"><span id="view_t_used"></span> / <span id="view_t_limit"></span></span></div>
        <div class="progress-bar"><div class="progress-fill" id="view_t_bar"></div></div>
        <div style="text-align:right;margin-top:5px"><button class="btn btn-gray" style="font-size:.7rem;padding:4px 8px" onclick="resetTraffic()">重置流量</button></div>
      </div>
      <div style="margin-top:25px;display:flex;justify-content:flex-end;"><button class="btn btn-primary" onclick="closeModal()">关闭</button></div>
    </div>
  </div>

  <div id="setModal" class="modal">
    <div class="modal-box">
      <div class="tab-header">
        <div class="tab-btn active" onclick="switchTab(0)">管理账户</div>
        <div class="tab-btn" onclick="switchTab(1)">个性背景</div>
      </div>
      <div class="tab-content active" id="tab0">
        <label>用户名</label><input id="set_u" value="__USERNAME__">
        <label>重置密码 (留空保持不变)</label><input id="set_p" type="password">
        <div style="margin-top:25px;display:flex;justify-content:flex-end;gap:12px">
          <button class="btn btn-gray" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="saveAccount()">确认修改</button>
        </div>
      </div>
      <div class="tab-content" id="tab1">
        <label>PC端壁纸 URL</label><input id="bg_pc" value="__BG_PC__">
        <label>手机端壁纸 URL</label><input id="bg_mob" value="__BG_MOBILE__">
        <div style="margin-top:25px;display:flex;justify-content:flex-end;gap:12px">
          <button class="btn btn-gray" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="saveBg()">应用背景</button>
        </div>
      </div>
    </div>
  </div>

  <div id="batchModal" class="modal">
    <div class="modal-box" style="max-width:600px">
      <h3>批量添加规则</h3>
      <p style="color:#666;font-size:.85rem;margin-bottom:10px">格式：备注,监听端口,目标地址<br>一行一条，例如：<br>日本落地,10001,1.1.1.1:443</p>
      <textarea id="batch_input" rows="10" style="width:100%;font-family:monospace" placeholder="备注,监听端口,目标地址"></textarea>
      <div style="margin-top:25px;display:flex;justify-content:flex-end;gap:12px">
        <button class="btn btn-gray" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveBatch()">开始导入</button>
      </div>
    </div>
  </div>

  <div id="restoreModal" class="modal">
    <div class="modal-box">
      <h3>恢复备份</h3>
      <p style="color:#ef4444;font-size:.9rem;margin-bottom:15px">警告：导入操作将覆盖当前所有规则！</p>
      <textarea id="restore_input" rows="8" style="width:100%;font-family:monospace;font-size:.8rem"></textarea>
      <div style="margin-top:25px;display:flex;justify-content:flex-end;gap:12px">
        <button class="btn btn-gray" onclick="closeModal()">取消</button>
        <button class="btn btn-danger" onclick="doRestore()">确认覆盖</button>
      </div>
    </div>
  </div>

  <script>
    let rules=[];let curId=null;
    const $=id=>document.getElementById(id);
    const fmtBytes=b=>{b=Number(b||0);if(b===0)return'0 B';const k=1024,dm=2,sizes=['B','KB','MB','GB','TB'],i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(dm))+' '+sizes[i]};
    const fmtDate=ts=>{if(!ts)return'永久有效';return new Date(Number(ts)).toLocaleString()};
    const getRemain=ts=>{if(!ts)return'';const now=Date.now();const diff=Number(ts)-now;if(diff<0)return'已过期';const d=Math.floor(diff/(1000*60*60*24));const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));return `剩余 ${d}天 ${h}小时`;};

    async function api(url,opt={}){
      const res=await fetch(url,opt);
      if(res.status===401){location.href='/login';throw new Error('unauthorized');}
      return res;
    }

    async function load(){
      const r=await api('/api/rules');
      const d=await r.json();
      rules=d.rules||[];
      render();
    }

    function render(){
      const t=$('list');const ev=$('emptyView');const table=$('ruleTable');
      t.innerHTML='';
      if(rules.length===0){ev.style.display='block';table.style.display='none';return;}
      ev.style.display='none';table.style.display='table';
      rules.forEach(r=>{
        const row=document.createElement('tr');
        if(!r.enabled)row.style.opacity='0.6';
        let statusHtml=`<span class="status-dot ${r.enabled?'bg-green':'bg-gray'}"></span>${r.enabled?'在线':'暂停'}`;
        if(r.status_msg)statusHtml+=` <span style="font-size:.8rem;color:#ef4444">(${r.status_msg})</span>`;
        const btns=`<button class="btn btn-gray" onclick="openView('${r.id}')"><i class="fas fa-eye"></i></button><button class="btn btn-gray" onclick="tog('${r.id}')"><i class="fas ${r.enabled?'fa-pause':'fa-play'}"></i></button><button class="btn btn-primary" onclick="openEdit('${r.id}')"><i class="fas fa-edit"></i></button><button class="btn btn-danger" onclick="delRule('${r.id}')"><i class="fas fa-trash-alt"></i></button>`;
        let tfStr=fmtBytes(r.traffic_used);
        if(Number(r.traffic_limit)>0)tfStr+=` / ${fmtBytes(r.traffic_limit)}`;
        if(window.innerWidth<768){
          row.innerHTML=`<td data-label="状态">${statusHtml}</td><td data-label="备注"><strong>${r.name}</strong></td><td data-label="监听">${r.listen}</td><td data-label="目标">${r.remote}</td><td data-label="流量">${tfStr}</td><td data-label="操作">${btns}</td>`;
        }else{
          row.innerHTML=`<td data-label="状态">${statusHtml}</td><td data-label="备注"><strong>${r.name}</strong></td><td data-label="监听">${r.listen}</td><td data-label="目标">${r.remote}</td><td data-label="流量">${tfStr}</td><td data-label="操作" style="display:flex;gap:6px;justify-content:flex-end;padding-right:15px">${btns}</td>`;
        }
        t.appendChild(row);
      });
    }

    function openAddModal(){
      curId=null;$('modalTitle').innerText='添加规则';
      ['n','l','r','e','t_val'].forEach(x=>$('mod_'+x).value='');
      $('mod_t_unit').value='MB';
      const qn=$('n').value.trim(),ql=$('l').value.trim(),qr=$('r').value.trim();
      if(qn)$('mod_n').value=qn;if(ql)$('mod_l').value=ql;if(qr)$('mod_r').value=qr;
      $('ruleModal').style.display='flex';
    }

    function openEdit(id){
      curId=id;
      const r=rules.find(x=>x.id===id);if(!r)return;
      $('modalTitle').innerText='编辑规则';
      $('mod_n').value=r.name;
      $('mod_l').value=r.listen.replace('0.0.0.0:','');
      $('mod_r').value=r.remote;
      if(r.expire_date){const dt=new Date(Number(r.expire_date));dt.setMinutes(dt.getMinutes()-dt.getTimezoneOffset());$('mod_e').value=dt.toISOString().slice(0,16);}else{$('mod_e').value='';}
      if(Number(r.traffic_limit)>0){if(r.traffic_limit>=1073741824){$('mod_t_val').value=(r.traffic_limit/1073741824).toFixed(2);$('mod_t_unit').value='GB';}else{$('mod_t_val').value=(r.traffic_limit/1048576).toFixed(2);$('mod_t_unit').value='MB';}}else{$('mod_t_val').value='';$('mod_t_unit').value='MB';}
      $('ruleModal').style.display='flex';
    }

    function openView(id){
      curId=id;
      const r=rules.find(x=>x.id===id);if(!r)return;
      $('view_n').innerText=r.name;$('view_l').innerText=r.listen;$('view_r').innerText=r.remote;
      if(r.expire_date){$('view_expire_sec').style.display='block';$('view_e_date').innerText=fmtDate(r.expire_date);$('view_e_remain').innerText=getRemain(r.expire_date);}else{$('view_expire_sec').style.display='none';}
      $('view_traffic_sec').style.display='block';$('view_t_used').innerText=fmtBytes(r.traffic_used);
      if(Number(r.traffic_limit)>0){$('view_t_limit').innerText=fmtBytes(r.traffic_limit);const pct=Math.min(100,(Number(r.traffic_used)/Number(r.traffic_limit))*100);$('view_t_bar').style.width=pct+'%';$('view_t_bar').style.background=pct>90?'#ef4444':'#3b82f6';}else{$('view_t_limit').innerText='无限制';$('view_t_bar').style.width='0%';}
      $('viewModal').style.display='flex';
    }

    async function saveRule(){
      let [n,l,r,e,tv,tu]=['n','l','r','e','t_val','t_unit'].map(x=>$('mod_'+x).value.trim());
      if(!n||!l||!r)return alert('请填写必填项');
      if(!l.includes(':'))l='0.0.0.0:'+l;
      let ed=0;if(e)ed=new Date(e).getTime();
      let tl=0;if(tv&&parseFloat(tv)>0)tl=parseFloat(tv)*(tu==='GB'?1073741824:1048576);
      const payload={name:n,listen:l,remote:r,expire_date:ed,traffic_limit:Math.floor(tl)};
      const url=curId?`/api/rules/${curId}`:'/api/rules';
      const method=curId?'PUT':'POST';
      const res=await api(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const d=await res.json();
      if(d.status==='error')alert(d.message);else{closeModal();load();$('n').value='';$('l').value='';$('r').value='';}
    }

    async function resetTraffic(){if(!curId||!confirm('确定重置已用流量统计吗？'))return;await api(`/api/rules/${curId}/reset_traffic`,{method:'POST'});closeModal();load();}
    async function tog(id){await api(`/api/rules/${id}/toggle`,{method:'POST'});load();}
    async function delRule(id){if(confirm('确定删除此规则吗？')){await api(`/api/rules/${id}`,{method:'DELETE'});load();}}
    function openSettings(){$('setModal').style.display='flex';switchTab(0);}
    function closeModal(){document.querySelectorAll('.modal').forEach(x=>x.style.display='none');}
    function switchTab(idx){document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));document.querySelectorAll('.tab-content').forEach((c,i)=>c.classList.toggle('active',i===idx));}
    async function saveAccount(){await api('/api/admin/account',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:$('set_u').value,password:$('set_p').value})});alert('账户已更新，请重新登录');location.reload();}
    async function saveBg(){await api('/api/admin/bg',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bg_pc:$('bg_pc').value,bg_mobile:$('bg_mob').value})});location.reload();}
    async function doLogout(){await fetch('/logout',{method:'POST'});location.href='/login';}
    function openBatch(){$('batchModal').style.display='flex';$('batch_input').value='';}
    async function saveBatch(){const raw=$('batch_input').value;if(!raw.trim())return;const lines=raw.split('\n');const payload=[];for(let line of lines){line=line.trim();if(!line)continue;line=line.replace(/，/g,',');const parts=line.split(',');if(parts.length<3)continue;let[n,l,r]=[parts[0].trim(),parts[1].trim(),parts[2].trim()];if(l&&!l.includes(':'))l='0.0.0.0:'+l;if(n&&l&&r)payload.push({name:n,listen:l,remote:r,expire_date:0,traffic_limit:0});}if(payload.length===0)return alert('格式错误');const res=await api('/api/rules/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});alert((await res.json()).message);$('batchModal').style.display='none';load();}
    async function delAll(){if(rules.length===0||!confirm('⚠️ 确定清空？'))return;await api('/api/rules/all',{method:'DELETE'});load();}
    function downloadBackup(){if(rules.length===0)return alert('无数据');window.location.href='/api/backup';}
    function openRestore(){$('restoreModal').style.display='flex';}
    async function doRestore(){try{const p=JSON.parse($('restore_input').value);if(!Array.isArray(p))throw 1;if(!confirm('确定覆盖？'))return;await api('/api/restore',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});location.reload();}catch(e){alert('JSON格式错误');}}
    setInterval(load,3000);
    load();
    window.addEventListener('resize',render);
  </script>
</body>
</html>
